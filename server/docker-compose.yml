version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: today-ok-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    volumes:
      - db-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/docs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  db-data:
    driver: local
